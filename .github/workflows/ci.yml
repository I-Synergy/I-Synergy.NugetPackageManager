name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v1-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v1-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run vscode:prepublish

      - name: Lint
        run: npm run lint

      - name: Run Tests
        run: |
          rm -rf out
          npm run test-compile
          xvfb-run -a npm test

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v1-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v1-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run vscode:prepublish

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Package .vsix
        run: npx @vscode/vsce package --no-dependencies --out I-Synergy.NugetPackageManager.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: I-Synergy.NugetPackageManager.vsix
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
